name: Build MicroPython + LVGL

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      mpy_tag:
        description: 'MicroPython Tag'
        required: false
        default: ''
      lvgl_tag:
        description: 'LVGL Tag'
        required: false
        default: ''
      is_release:
        description: 'Create a Release'
        required: false
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check scripts/ modules/

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - id: set-matrix
        run: |
          MATRIX=$(python3 scripts/build.py --ci-matrix)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: [lint, prepare]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake ninja-build doxygen
        pip install pyelftools

    - name: Build Firmware
      if: matrix.target != 'esp32'
      run: python3 scripts/build.py --target ${{ matrix.target }} --board ${{ matrix.board }}

    - name: Build ESP32
      if: matrix.target == 'esp32'
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.5.1
        path: '.'
        command: 'python3 scripts/build.py --target esp32 --board ${{ matrix.board }}'

    - name: Prepare Artifact
      run: |
        mkdir -p deploy
        if [ "${{ matrix.target }}" = "rp2040" ] || [ "${{ matrix.target }}" = "rp2350" ]; then
          cp submodules/micropython/ports/rp2/build-${{ matrix.board }}/firmware.uf2 deploy/lvgl-mpy-${{ matrix.target }}-${{ matrix.board }}.uf2
        elif [ "${{ matrix.target }}" = "esp32" ]; then
          cp submodules/micropython/ports/esp32/build-${{ matrix.board }}/micropython.bin deploy/lvgl-mpy-${{ matrix.target }}-${{ matrix.board }}.bin
        elif [ "${{ matrix.target }}" = "nrf52" ]; then
          cp submodules/micropython/ports/nrf/build-${{ matrix.board }}/firmware.hex deploy/lvgl-mpy-${{ matrix.target }}-${{ matrix.board }}.hex
        elif [ "${{ matrix.target }}" = "unix" ]; then
          cp submodules/micropython/ports/unix/build-standard/micropython deploy/lvgl-mpy-unix
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.target }}-${{ matrix.board }}
        path: deploy/*

  release:
    needs: build
    if: ${{ github.event.inputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.mpy_tag }}_${{ github.event.inputs.lvgl_tag }}
          name: Release ${{ github.event.inputs.mpy_tag }}_${{ github.event.inputs.lvgl_tag }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
